/* KPI ROW */
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; padding: 20px 24px; }
.kpi-card { background: #0f1c2e; border: 1px solid #2a3f5f; border-radius: 10px; padding: 16px 18px; }
.kpi-label { font-size: clamp(10px, 1vw, 12px); color: #8899aa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
.kpi-value { font-size: clamp(18px, 2.5vw, 28px); font-weight: 700; color: #fff; }
.kpi-value.orange { color: #e8872a; }
.kpi-value.green { color: #6bc47f; }

/* CHART GRID */
.chart-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 24px 24px; }
.chart-card { background: #0f1c2e; border: 1px solid #2a3f5f; border-radius: 10px; padding: 20px; position: relative; }
.chart-card h3 { font-size: clamp(12px, 1.2vw, 15px); color: #8899aa; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.chart-wrap { position: relative; height: 300px; }
.expand-btn { position: absolute; top: 12px; right: 12px; background: rgba(42,63,95,0.5); border: none; color: #8899aa; font-size: 16px; cursor: pointer; border-radius: 6px; padding: 4px 8px; z-index: 2; }
.expand-btn:hover { color: #fff; background: rgba(42,63,95,0.8); }

/* FULLSCREEN OVERLAY */
.fullscreen-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10,20,35,0.95); z-index: 10000; padding: 40px; }
.fullscreen-overlay.active { display: flex; flex-direction: column; }
.fullscreen-close { position: absolute; top: 16px; right: 24px; background: #2a3f5f; border: none; color: #ffc; font-size: 14px; cursor: pointer; border-radius: 8px; padding: 8px 16px; }
.fullscreen-chart { flex: 1; position: relative; }

/* REPORT TABLE */
.content { display: none; }
.content.active { display: block; }
.report-table { width: 100%; border-collapse: collapse; margin: 20px 24px; font-size: 13px; }
.report-table th { background: #0d1926; color: #8899aa; padding: 10px 14px; text-align: left; border-bottom: 2px solid #2a3f5f; white-space: nowrap; position: sticky; top: 0; }
.report-table td { padding: 10px 14px; border-bottom: 1px solid #1a2f4a; white-space: nowrap; }
.report-table tr:hover td { background: rgba(42,63,95,0.2); }

/* SPECIALTY / DONUT */
.spec-row { display: flex; justify-content: space-between; alin-items: center; padding: 8px 10px; border-radius: 4px; }
.spec-row:nth-child(even) { background: rgba(42, 63, 95, 0.15); }
.spec-bar-wrap { flex: 1; margin: 0 12px; height: 6px; background: #1a2f4a; border-radius: 3px; }
.spec-bar { height: 100%; background: #e8872a; border-radius: 3px; }
.spec-label { font-size: clamp(11px, 1.1vw, 15px); color: #8899aa; min-width: 80px; }
.spec-val { font-size: clamp(11px, 1.1vw, 15px); color: #fff; font-weight: 600; min-width: 60px; text-align: right; }
.specialty-grid { display: grid; grid-template-columns: 1fr; gap: 4px; }

/* FILTER BAR STYLES */
.filter-bar { background: #0d1926; border-bottom: 1px solid #2a3f5f; padding: 12px 24px; }
.filter-preset { transition: all 0.2s; }
.filter-preset:hover { background: #2a3f5f; color: #ccc; }
.filter-preset.active { background: #e8872a; color: #ffc; }

@media (max-width: 900px) {
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .chart-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .header { flex-direction: column; gap: 10px; }
}
</style>
</head>

const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmt(n) { return '$' + Math.round(n).toLocaleString(); }

function sortedDates(arr) {
    return [...new Set(arr.map(r => r.date))].sort();
}

function groupByDate(arr) {
    const g = {};
    arr.forEach(r => {
        if (!g[r.date]) g[r.date] = {};
        g[r.date][r.dimension] = (g[r.date][r.dimension] || 0) + r.value;
    });
    return g;
}

async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function handleLogin(e) {
    e.preventDefault();
    const user = document.getElementById('loginUser').value.toLowerCase().trim();
    const pass = document.getElementById('loginPass').value;
    const hash = await sha256(pass);
    if (USERS[user] && USERS[user] === hash) {
        sessionStorage.setItem('dds_user', user);
        showDashboard(user);
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
    return false;
}

function handleLogout() {
    sessionStorage.removeItem('dds_user');
    document.getElementById('loginOverlay').classList.remove('hidden');

function setPresetFilter(preset) {
    currentFilter = preset;
    allDates = extractAllDates();
    if (allDates.length === 0) return;
    const last = allDates[allDates.length - 1];
    let start, end = last;

    if (preset === '1m') {
        start = last; end = last;
    } else if (preset === '3m') {
        const d = new Date(last + '-01');
        d.setMonth(d.getMonth() - 2);
        start = d.toISOString().slice(0, 7);
    } else if (preset === '6m') {
        const d = new Date(last + '-01');
        d.setMonth(d.getMonth() - 5);
        start = d.toISOString().slice(0, 7);
    } else if (preset === '12m') {
        const d = new Date(last + '-01');
        d.setMonth(d.getMonth() - 11);
        start = d.toISOString().slice(0, 7);
    } else if (preset === 'ytd') {
        start = last.slice(0, 4) + '-01';
    } else {
        start = allDates[0];
    }

    updateActiveFilterButton(preset);
    updateFilterDisplay(start, end);
    updateDashboard(start, end);
}

function navMonth(dir) {
    allDates = extractAllDates();
    if (allDates.length === 0) return;
    if (currentMonthIdx === -1) currentMonthIdx = allDates.length - 1;
    currentMonthIdx = Math.max(0, Math.min(allDates.length - 1, currentMonthIdx + dir));

}

function calcAvg12(dimension) {
    const allDates = sortedDates(RAW.results);
    const last12 = allDates.slice(-12);
    const g = groupByDate(RAW.results);
    let sum = 0;
    last12.forEach(d => { sum += (g[d] && g[d][dimension]) || 0; });
    return sum / (last12.length || 1);
}
