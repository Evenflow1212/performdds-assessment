[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate-workbook"]
  timeout = 26
  included_files = ["Blank_Assessment_Template.xlsx", "netlify/functions/Blank_Assessment_Template.xlsx"]

[functions."parse-pdf"]
  timeout = 26

[functions."extract-pdf"]
  timeout = 26

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true
