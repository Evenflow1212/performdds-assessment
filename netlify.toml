[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate-workbook"]
  timeout = 10

[functions."parse-pdf"]
  timeout = 10

[functions."extract-pdf"]
  timeout = 26

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/"
  to = "/assessment_hub.html"
  status = 200
  force = true
