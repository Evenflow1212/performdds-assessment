[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate-report"]
  timeout = 26
  included_files = ["assessment-report-template.html", "netlify/functions/assessment-report-template.html"]

[functions."parse-pdf"]
  timeout = 26

[functions."extract-pdf"]
  timeout = 26

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true
